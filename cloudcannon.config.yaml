timezone: Etc/UTC

source_editor:
  tab_size: 2
  theme: monokai
  show_gutter: true

paths:
  static: static
  uploads: static/images

commit_templates:
  - label: Default message
    template_string: '[default_commit_message]'
  - label: Custom message
    template_string: '{message}'

collections_config_override: true

collections_config:
  yurtici_programlar:
    path: content/yurtici-programlar
    url: "/yurtici-programlar/[slug]/"
    name: Yurtiçi Programlar
    icon: flight_takeoff
    glob:
      - "!_index.md"
    _enabled_editors:
      - content
    _inputs:
      program_tipi:
        type: select
        options:
          values:
            - Gezi
            - Afterschool
            - Eğitim Programı
      status:
        type: select
        options:
          values:
            - aktif
            - pasif
      target_group:
        type: text
        label: Hedef Kitle
      school:
        type: text
        label: Okul
      location:
        type: text
        label: Konum
      duration:
        type: text
        label: Süre
      deadline:
        type: datetime
        label: Son Kayıt Tarihi
      image:
        type: image
        options:
          paths:
            uploads: images/portfolio

  yurtdisi_programlar:
    path: content/yurtdisi-programlar
    url: "/yurtdisi-programlar/[slug]/"
    name: Yurtdışı Programlar
    icon: public
    glob:
      - "!_index.md"
    _enabled_editors:
      - content
    _inputs:
      program_tipi:
        type: select
        options:
          values:
            - Gezi
            - Yaz Okulu
            - Eğitim Programı
      status:
        type: select
        options:
          values:
            - aktif
            - pasif
      target_group:
        type: text
        label: Hedef Kitle
      school:
        type: text
        label: Okul
      location:
        type: text
        label: Konum
      duration:
        type: text
        label: Süre
      deadline:
        type: datetime
        label: Son Kayıt Tarihi
      image:
        type: image
        options:
          paths:
            uploads: images/portfolio

  bireysel_hazirlik:
    path: content/bireysel-hazirlik
    url: "/bireysel-hazirlik/[slug]/"
    name: Bireysel Hazırlık
    icon: school
    glob:
      - "!_index.md"
    _enabled_editors:
      - content

  pages:
    path: content
    url: "/[slug]/"
    name: Sayfalar
    icon: text_ad
    glob:
      - "*.md"
      - "!_index.md"
    _enabled_editors:
      - visual
    schemas:
      page:
        path: .cloudcannon/schemas/page.md
  portfolios:
    path: content/portfolios
    url: "/portfolios/[slug]/"
    glob: 
      - "!_index.md"
    schemas:
      default:
        path: .cloudcannon/schemas/portfolio.md
    icon: work
    _enabled_editors:
      - visual
    _inputs:
      category:
        type: text
        comment: Define which category this portfolio item should belong to in the portfolios list.
      portfolio_details:
        type: object
        options:
          preview:
            icon: work
            image:
              - key: image
            text:
              - key: heading
      portfolio_details.image:
        type: image
        options:
          required: true
          required_message: Portfolio must have an image.
          paths:
            uploads: images/portfolio
  posts:
    path: content/posts
    url: "/posts/[slug]/"
    glob: 
      - "!_index.md"
    schemas:
      default:
        path: .cloudcannon/schemas/post.md
    icon: newspaper
    _enabled_editors:
      - content
      - visual
    _inputs:
      categories:
        type: array
        comment: Define which categories this post should belong to on the blog page.
      categories[*]:
        type: text
      images:
        type: array
        options:
          structures: _structures.post_image
          min_items: 1
          min_items_message: Must have at least one image for this post.
      link:
        type: text
        comment: The text used for this post's link in the list of posts.
      description:
        type: textarea
        comment: Used as the description for the post's preview in the list of posts.
    _structures:
      post_image:
        values:
          - value:
              image:
              image_alt:
            _inputs:
              image:
                type: image
                options:
                  paths:
                    uploads: images/blog
            preview:
              icon: image
              image:
                - key: image
              text:
                - key: image_alt
              subtext: 
                - key: image
  data:
    path: data
    name: Global Ayarlar
    icon: settings
    disable_url: true
    _inputs:
      google_maps_api_key:
        comment: Add your key if you want to use google maps features within the site
      favicon:
        type: image
      contact:
        type: object
        options:
          preview:
            icon: contact_page
      social_media:
        type: object
        options:
          preview:
            icon: communities
      menu:
        type: array
        options:
          structures: _structures.menu_items
      about:
        type: textarea
    _structures:
      menu_items:
        values:
          - value:
              name: 
              url:
              open_in_new_tab: false
            _inputs:
              open_in_new_tab:
                type: switch
            preview:
              icon: link
      

_inputs:
  content_blocks:
    type: array
    options:
      structures: _structures.content_blocks
  hero_blocks:
    type: array
    options:
      structures: _structures.hero_blocks
      max_items: 1
      max_items_message: Only define one hero block, so that you don't have more than one <h1> element on a page.
  text_content:
    type: markdown
  seo_options:
    type: object
    options:
      preview:
        icon: query_stats
        text:
          - 'Search engine optimization'
        subtext:
          - key: page_description
          - 'Update SEO values for the page'
  type:
    hidden: true


_editables:
  content:
    blockquote: true
    bold: true
    format: p h2 h3 h4
    italic: true
    strike: true
    subscript: true
    superscript: true
    underline: true
    link: true
    bulletedlist: true
    indent: true
    numberedlist: true
    outdent: true
    code: true
    embed: true
    horizontalrule: true
    image: true
    undo: true
    redo: true
    removeformat: true
    copyformatting: true
    image_size_attributes: true
