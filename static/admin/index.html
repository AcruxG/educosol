<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>EduCoSol Admin</title>
  <link rel="icon" type="image/svg+xml" href="/images/favicon.svg">
  <style>
    :root {
      --bg: #0f0f12;
      --surface: #1a1a22;
      --surface-2: #22222e;
      --border: rgba(255,255,255,0.08);
      --text: #f0f0f5;
      --text-muted: #8a8a9a;
      --brand: #C63527;
      --brand-hover: #d94436;
      --success: #22c55e;
      --danger: #ef4444;
      --radius: 10px;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    a { color: var(--brand); text-decoration: none; }

    /* ── Login ───────────────────────────── */
    .login-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    .login-box h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 6px;
      color: var(--brand);
    }
    .login-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; }
    .form-group { margin-bottom: 16px; text-align: left; }
    .form-group label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    .form-input:focus { border-color: var(--brand); }
    .form-input::placeholder { color: var(--text-muted); }
    textarea.form-input { min-height: 200px; resize: vertical; font-family: 'Consolas', 'Monaco', monospace; }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: var(--radius);
      border: none;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-primary { background: var(--brand); color: #fff; width: 100%; }
    .btn-primary:hover { background: var(--brand-hover); }
    .btn-sm { padding: 8px 16px; font-size: 13px; }
    .btn-success { background: var(--success); color: #fff; }
    .btn-success:hover { opacity: 0.9; }
    .btn-danger { background: var(--danger); color: #fff; }
    .btn-danger:hover { opacity: 0.9; }
    .btn-ghost { background: transparent; border: 1px solid var(--border); color: var(--text); }
    .btn-ghost:hover { border-color: var(--text-muted); }
    .error-msg { color: var(--danger); font-size: 13px; margin-top: 12px; min-height: 20px; }

    /* ── App Layout ──────────────────────── */
    .app { display: none; }
    .app.visible { display: flex; min-height: 100vh; }
    .sidebar {
      width: 260px;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
      position: fixed;
      top: 0;
      left: 0;
      bottom: 0;
      z-index: 100;
    }
    .sidebar-header {
      padding: 20px 20px 16px;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 { font-size: 18px; font-weight: 700; color: var(--brand); }
    .sidebar-header small { font-size: 11px; color: var(--text-muted); }
    .sidebar-nav { flex: 1; padding: 12px 10px; overflow-y: auto; }
    .sidebar-nav button {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .sidebar-nav button:hover { background: rgba(255,255,255,0.04); color: var(--text); }
    .sidebar-nav button.active { background: rgba(198,53,39,0.12); color: var(--brand); }
    .sidebar-nav button .icon { font-size: 18px; width: 22px; text-align: center; }
    .sidebar-nav button .badge {
      margin-left: auto;
      background: var(--surface-2);
      color: var(--text-muted);
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 10px;
    }
    .sidebar-footer {
      padding: 14px 20px;
      border-top: 1px solid var(--border);
    }
    .sidebar-footer button {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 13px;
      cursor: pointer;
      transition: color 0.2s;
    }
    .sidebar-footer button:hover { color: var(--danger); }

    .main { flex: 1; margin-left: 260px; }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 50;
    }
    .topbar h3 { font-size: 18px; font-weight: 700; }
    .content-area { padding: 28px 32px; }

    /* ── Event List ──────────────────────── */
    .event-list { display: flex; flex-direction: column; gap: 10px; }
    .event-item {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .event-item:hover { border-color: rgba(198,53,39,0.3); }
    .event-thumb {
      width: 64px;
      height: 48px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--surface-2);
      flex-shrink: 0;
    }
    .event-info { flex: 1; min-width: 0; }
    .event-info h4 { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .event-meta { font-size: 12px; color: var(--text-muted); display: flex; gap: 12px; flex-wrap: wrap; }
    .event-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .event-actions button { padding: 6px 10px; font-size: 12px; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 48px; margin-bottom: 16px; display: block; }
    .empty-state p { font-size: 14px; margin-bottom: 20px; }

    /* ── Editor Form ─────────────────────── */
    .editor { max-width: 720px; }
    .editor .form-group { margin-bottom: 20px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .editor-actions { display: flex; gap: 10px; margin-top: 28px; padding-top: 20px; border-top: 1px solid var(--border); }
    .img-preview { max-width: 200px; max-height: 120px; border-radius: 8px; margin-top: 8px; display: block; }
    .img-upload-area {
      border: 2px dashed var(--border);
      border-radius: var(--radius);
      padding: 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s;
    }
    .img-upload-area:hover { border-color: var(--brand); }
    .img-upload-area input { display: none; }
    .img-upload-area p { font-size: 13px; color: var(--text-muted); }

    /* ── Settings ─────────────────────────── */
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      max-width: 560px;
    }
    .settings-card h4 { font-size: 16px; margin-bottom: 4px; }
    .settings-card p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
    .settings-card + .settings-card { margin-top: 20px; }
    .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
    .status-dot.ok { background: var(--success); }
    .status-dot.err { background: var(--danger); }

    /* ── Loading / Toast ──────────────────── */
    .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.2); border-top-color: #fff; border-radius: 50%; animation: spin 0.6s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 20px;
      font-size: 13px;
      z-index: 9999;
      animation: slideUp 0.3s ease;
      max-width: 360px;
    }
    .toast.success { border-color: var(--success); }
    .toast.error { border-color: var(--danger); }
    @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Responsive ───────────────────────── */
    @media (max-width: 768px) {
      .sidebar { width: 220px; }
      .main { margin-left: 220px; }
      .topbar { padding: 14px 20px; }
      .content-area { padding: 20px; }
      .form-row { grid-template-columns: 1fr; }
    }

    /* Confirm dialog */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
    }
    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      max-width: 400px;
      width: 90%;
      text-align: center;
    }
    .confirm-box h4 { margin-bottom: 8px; }
    .confirm-box p { font-size: 14px; color: var(--text-muted); margin-bottom: 24px; }
    .confirm-box .btn-row { display: flex; gap: 10px; justify-content: center; }
  </style>
</head>
<body>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="login-screen" class="login-wrapper">
  <div class="login-box">
    <h1>EduCoSol</h1>
    <p>Admin paneline giriş yapın</p>
    <form id="login-form">
      <div class="form-group">
        <label>E-posta</label>
        <input type="email" id="login-email" class="form-input" placeholder="admin@educosol.com" required>
      </div>
      <div class="form-group">
        <label>Şifre</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary" id="login-btn">Giriş Yap</button>
      <div class="error-msg" id="login-error"></div>
    </form>
  </div>
</div>

<!-- ═══ APP SHELL ═══ -->
<div id="app" class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>EduCoSol</h2>
      <small>Etkinlik Yönetimi</small>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button onclick="logout()">&#x2190; Çıkış Yap</button>
    </div>
  </aside>

  <!-- Main content -->
  <div class="main">
    <div class="topbar">
      <h3 id="page-title">Dashboard</h3>
      <div id="topbar-actions"></div>
    </div>
    <div class="content-area" id="content-area"></div>
  </div>
</div>

<!-- ═══ Firebase SDK ═══ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
// ─── CONFIG ──────────────────────────────────────
// Replace with your Firebase project config
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCATtHKZUoWcLIzYwXpZ3ZgynMp3xXWCB4",
  authDomain: "educosol-admin.firebaseapp.com",
  projectId: "educosol-admin",
  storageBucket: "educosol-admin.firebasestorage.app",
  messagingSenderId: "541972719094",
  appId: "1:541972719094:web:649360db3b301ae90693d7",
  measurementId: "G-W4WRSD4QMD"
};

const GITHUB_OWNER = "AcruxG";
const GITHUB_REPO = "educosol";
const GITHUB_BRANCH = "main";

const CATEGORIES = [
  { id: "yurtici-geziler",    label: "Yurtiçi Geziler",              icon: "🏔️", folder: "content/yurtici-geziler" },
  { id: "yurtdisi-geziler",   label: "Yurtdışı Geziler",             icon: "✈️", folder: "content/yurtdisi-geziler" },
  { id: "yurtdisi-egitim",    label: "Yurtdışı Eğitim Programları",  icon: "🎓", folder: "content/yurtdisi-egitim" },
  { id: "afterschool",        label: "Afterschool & Yaz Okulu",      icon: "☀️", folder: "content/afterschool" },
  { id: "bireysel-hazirlik",  label: "Bireysel Hazırlık",            icon: "📋", folder: "content/bireysel-hazirlik" }
];

// ─── STATE ───────────────────────────────────────
let ghToken = "";
let currentCategory = null;
let eventsCache = {};

// ─── FIREBASE INIT ───────────────────────────────
firebase.initializeApp(FIREBASE_CONFIG);
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (user) {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").classList.add("visible");
    ghToken = localStorage.getItem("educosol_gh_token") || "";
    buildSidebar();
    if (!ghToken) {
      showSettings();
    } else {
      navigateTo(CATEGORIES[0].id);
    }
  } else {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("app").classList.remove("visible");
  }
});

// ─── LOGIN ───────────────────────────────────────
document.getElementById("login-form").addEventListener("submit", async e => {
  e.preventDefault();
  const email = document.getElementById("login-email").value;
  const pass = document.getElementById("login-password").value;
  const errEl = document.getElementById("login-error");
  const btn = document.getElementById("login-btn");
  errEl.textContent = "";
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;
  try {
    await auth.signInWithEmailAndPassword(email, pass);
  } catch (err) {
    const msgs = {
      "auth/user-not-found": "Kullanıcı bulunamadı.",
      "auth/wrong-password": "Şifre hatalı.",
      "auth/invalid-email": "Geçersiz e-posta.",
      "auth/invalid-credential": "E-posta veya şifre hatalı.",
      "auth/too-many-requests": "Çok fazla deneme. Lütfen bekleyin."
    };
    errEl.textContent = msgs[err.code] || err.message;
  }
  btn.textContent = "Giriş Yap";
  btn.disabled = false;
});

function logout() {
  auth.signOut();
}

// ─── SIDEBAR ─────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById("sidebar-nav");
  nav.innerHTML = CATEGORIES.map(c =>
    `<button onclick="navigateTo('${c.id}')" data-cat="${c.id}">
      <span class="icon">${c.icon}</span> ${c.label}
      <span class="badge" id="badge-${c.id}">-</span>
    </button>`
  ).join("") +
  `<div style="height:1px;background:var(--border);margin:10px 4px"></div>
   <button onclick="showSettings()" data-cat="settings">
     <span class="icon">⚙️</span> Ayarlar
   </button>`;
}

function setActiveSidebar(id) {
  document.querySelectorAll(".sidebar-nav button").forEach(b => {
    b.classList.toggle("active", b.dataset.cat === id);
  });
}

// ─── NAVIGATION ──────────────────────────────────
async function navigateTo(catId) {
  if (!ghToken) { showSettings(); toast("Önce GitHub token girin.", "error"); return; }
  currentCategory = CATEGORIES.find(c => c.id === catId);
  setActiveSidebar(catId);
  setTitle(currentCategory.label);
  setTopAction(`<button class="btn btn-sm btn-primary" onclick="showEditor()">+ Yeni Ekle</button>`);
  await loadEvents(catId);
}

function setTitle(t) { document.getElementById("page-title").textContent = t; }
function setTopAction(html) { document.getElementById("topbar-actions").innerHTML = html; }

// ─── GITHUB API ──────────────────────────────────
async function ghFetch(path, opts = {}) {
  const url = `https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}?ref=${GITHUB_BRANCH}`;
  const res = await fetch(url, {
    ...opts,
    headers: {
      "Authorization": `Bearer ${ghToken}`,
      "Accept": "application/vnd.github+json",
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `GitHub API error ${res.status}`);
  }
  return res.json();
}

// ─── LOAD EVENTS ─────────────────────────────────
async function loadEvents(catId) {
  const area = document.getElementById("content-area");
  area.innerHTML = '<div style="text-align:center;padding:40px"><span class="spinner"></span></div>';
  try {
    const cat = CATEGORIES.find(c => c.id === catId);
    const files = await ghFetch(cat.folder);
    const mdFiles = files.filter(f => f.name.endsWith(".md") && f.name !== "_index.md");

    const events = [];
    for (const f of mdFiles) {
      const fileData = await ghFetch(`${cat.folder}/${f.name}`);
      const content = atob(fileData.content.replace(/\n/g, ""));
      const decoded = new TextDecoder().decode(Uint8Array.from(content, c => c.charCodeAt(0)));
      const parsed = parseFrontMatter(decoded);
      events.push({ ...parsed.data, slug: f.name.replace(".md", ""), sha: fileData.sha, _body: parsed.body, _filename: f.name });
    }

    eventsCache[catId] = events;
    document.getElementById(`badge-${catId}`).textContent = events.length;
    renderEventList(events);
  } catch (err) {
    area.innerHTML = `<div class="empty-state"><span class="icon">⚠️</span><p>${err.message}</p></div>`;
  }
}

function renderEventList(events) {
  const area = document.getElementById("content-area");
  if (!events.length) {
    area.innerHTML = `<div class="empty-state">
      <span class="icon">📂</span>
      <p>Bu kategoride henüz etkinlik yok.</p>
      <button class="btn btn-sm btn-primary" onclick="showEditor()">+ İlk Etkinliği Ekle</button>
    </div>`;
    return;
  }
  area.innerHTML = `<div class="event-list">${events.map((ev, i) => `
    <div class="event-item" onclick="showEditor(${i})">
      ${ev.image ? `<img class="event-thumb" src="https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/static${ev.image}" onerror="this.style.display='none'">` : ''}
      <div class="event-info">
        <h4>${esc(ev.title || "İsimsiz")}</h4>
        <div class="event-meta">
          ${ev.location ? `<span>📍 ${esc(ev.location)}</span>` : ""}
          ${ev.duration ? `<span>⏱ ${esc(ev.duration)}</span>` : ""}
          ${ev.date ? `<span>📅 ${new Date(ev.date).toLocaleDateString("tr-TR")}</span>` : ""}
        </div>
      </div>
      <div class="event-actions">
        <button class="btn btn-sm btn-ghost" onclick="event.stopPropagation();showEditor(${i})">Düzenle</button>
        <button class="btn btn-sm btn-danger" onclick="event.stopPropagation();confirmDelete(${i})">Sil</button>
      </div>
    </div>
  `).join("")}</div>`;
}

// ─── EDITOR ──────────────────────────────────────
function showEditor(index) {
  const isNew = index === undefined;
  const ev = isNew ? {} : eventsCache[currentCategory.id][index];

  setTitle(isNew ? `Yeni ${currentCategory.label.replace(/ler$|ları$/, "")}` : "Düzenle");
  setTopAction(`<button class="btn btn-sm btn-ghost" onclick="navigateTo('${currentCategory.id}')">← Geri</button>`);

  const area = document.getElementById("content-area");
  area.innerHTML = `
  <div class="editor">
    <div class="form-group">
      <label>Başlık</label>
      <input type="text" id="ed-title" class="form-input" value="${esc(ev.title || "")}" placeholder="Etkinlik başlığı">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Tarih</label>
        <input type="datetime-local" id="ed-date" class="form-input" value="${ev.date ? toLocalISO(ev.date) : ""}">
      </div>
      <div class="form-group">
        <label>Süre</label>
        <input type="text" id="ed-duration" class="form-input" value="${esc(ev.duration || "")}" placeholder="Örn: 2 Gün 1 Gece">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Konum</label>
        <input type="text" id="ed-location" class="form-input" value="${esc(ev.location || "")}" placeholder="Şehir veya ülke">
      </div>
      <div class="form-group">
        <label>Hedef Kitle</label>
        <input type="text" id="ed-target" class="form-input" value="${esc(ev.target_group || "")}" placeholder="Örn: Ortaokul ve Lise Öğrencileri">
      </div>
    </div>
    <div class="form-group">
      <label>Görsel Yolu</label>
      <input type="text" id="ed-image" class="form-input" value="${esc(ev.image || "")}" placeholder="/images/portfolio/gorsel-adi.png">
      <div class="img-upload-area" id="img-upload" style="margin-top:10px">
        <p>Yeni görsel yüklemek için tıklayın veya sürükleyin</p>
        <input type="file" id="img-file" accept="image/*">
      </div>
      ${ev.image ? `<img class="img-preview" src="https://raw.githubusercontent.com/${GITHUB_OWNER}/${GITHUB_REPO}/${GITHUB_BRANCH}/static${ev.image}" onerror="this.style.display='none'">` : ""}
    </div>
    <div class="form-group">
      <label>İçerik (Markdown)</label>
      <textarea id="ed-body" class="form-input">${esc(ev._body || "")}</textarea>
    </div>
    <div class="editor-actions">
      <button class="btn btn-primary" id="save-btn" onclick="saveEvent(${isNew ? -1 : index})">${isNew ? "Oluştur" : "Kaydet"}</button>
      <button class="btn btn-ghost" onclick="navigateTo('${currentCategory.id}')">İptal</button>
    </div>
  </div>`;

  // Image upload click
  document.getElementById("img-upload").addEventListener("click", () => document.getElementById("img-file").click());
  document.getElementById("img-file").addEventListener("change", handleImageUpload);
}

async function handleImageUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    const base64 = reader.result.split(",")[1];
    const ext = file.name.split(".").pop().toLowerCase();
    const slug = document.getElementById("ed-title").value.trim()
      .toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/-+$/, "") || "gorsel";
    const path = `static/images/portfolio/${slug}.${ext}`;

    toast("Görsel yükleniyor...", "info");
    try {
      // Check if file exists
      let sha;
      try { const existing = await ghFetch(path); sha = existing.sha; } catch {}

      await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${path}`, {
        method: "PUT",
        headers: {
          "Authorization": `Bearer ${ghToken}`,
          "Accept": "application/vnd.github+json"
        },
        body: JSON.stringify({
          message: `Upload image: ${slug}.${ext}`,
          content: base64,
          branch: GITHUB_BRANCH,
          ...(sha ? { sha } : {})
        })
      });

      document.getElementById("ed-image").value = `/images/portfolio/${slug}.${ext}`;
      toast("Görsel yüklendi!", "success");
    } catch (err) {
      toast("Görsel yüklenemedi: " + err.message, "error");
    }
  };
  reader.readAsDataURL(file);
}

// ─── SAVE ────────────────────────────────────────
async function saveEvent(index) {
  const title = document.getElementById("ed-title").value.trim();
  if (!title) { toast("Başlık zorunludur.", "error"); return; }

  const dateVal = document.getElementById("ed-date").value;
  const data = {
    title,
    date: dateVal ? new Date(dateVal).toISOString() : new Date().toISOString(),
    image: document.getElementById("ed-image").value.trim(),
    duration: document.getElementById("ed-duration").value.trim(),
    location: document.getElementById("ed-location").value.trim(),
    target_group: document.getElementById("ed-target").value.trim()
  };
  const body = document.getElementById("ed-body").value;

  const frontMatter = [
    "---",
    `title: "${data.title}"`,
    `date: ${data.date}`,
    `image: ${data.image}`,
    `duration: "${data.duration}"`,
    `location: "${data.location}"`,
    `target_group: "${data.target_group}"`,
    "---"
  ].join("\n");

  const fileContent = frontMatter + "\n\n" + body.trim() + "\n";
  const encoded = btoa(unescape(encodeURIComponent(fileContent)));

  const isNew = index === -1;
  let filename, sha;

  if (isNew) {
    filename = slugify(title) + ".md";
  } else {
    const ev = eventsCache[currentCategory.id][index];
    filename = ev._filename;
    sha = ev.sha;
  }

  const filePath = `${currentCategory.folder}/${filename}`;
  const btn = document.getElementById("save-btn");
  btn.innerHTML = '<span class="spinner"></span>';
  btn.disabled = true;

  try {
    await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filePath}`, {
      method: "PUT",
      headers: {
        "Authorization": `Bearer ${ghToken}`,
        "Accept": "application/vnd.github+json"
      },
      body: JSON.stringify({
        message: `${isNew ? "Add" : "Update"} event: ${title}`,
        content: encoded,
        branch: GITHUB_BRANCH,
        ...(sha ? { sha } : {})
      })
    });

    toast(isNew ? "Etkinlik oluşturuldu!" : "Etkinlik güncellendi!", "success");
    setTimeout(() => navigateTo(currentCategory.id), 800);
  } catch (err) {
    toast("Kayıt hatası: " + err.message, "error");
    btn.textContent = isNew ? "Oluştur" : "Kaydet";
    btn.disabled = false;
  }
}

// ─── DELETE ──────────────────────────────────────
function confirmDelete(index) {
  const ev = eventsCache[currentCategory.id][index];
  const overlay = document.createElement("div");
  overlay.className = "confirm-overlay";
  overlay.innerHTML = `
    <div class="confirm-box">
      <h4>Etkinliği Sil</h4>
      <p>"${esc(ev.title)}" etkinliğini silmek istediğinize emin misiniz?</p>
      <div class="btn-row">
        <button class="btn btn-sm btn-ghost" onclick="this.closest('.confirm-overlay').remove()">İptal</button>
        <button class="btn btn-sm btn-danger" id="confirm-del-btn">Evet, Sil</button>
      </div>
    </div>`;
  document.body.appendChild(overlay);

  document.getElementById("confirm-del-btn").addEventListener("click", async () => {
    overlay.remove();
    try {
      const filePath = `${currentCategory.folder}/${ev._filename}`;
      await fetch(`https://api.github.com/repos/${GITHUB_OWNER}/${GITHUB_REPO}/contents/${filePath}`, {
        method: "DELETE",
        headers: {
          "Authorization": `Bearer ${ghToken}`,
          "Accept": "application/vnd.github+json"
        },
        body: JSON.stringify({
          message: `Delete event: ${ev.title}`,
          sha: ev.sha,
          branch: GITHUB_BRANCH
        })
      });
      toast("Etkinlik silindi.", "success");
      navigateTo(currentCategory.id);
    } catch (err) {
      toast("Silme hatası: " + err.message, "error");
    }
  });
}

function saveToken() {

// ─── HELPERS ─────────────────────────────────────
function parseFrontMatter(text) {
  const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n?([\s\S]*)$/);
  if (!match) return { data: {}, body: text };
  const data = {};
  match[1].split("\n").forEach(line => {
    const idx = line.indexOf(":");
    if (idx === -1) return;
    const key = line.slice(0, idx).trim();
    let val = line.slice(idx + 1).trim();
    if ((val.startsWith('"') && val.endsWith('"')) || (val.startsWith("'") && val.endsWith("'")))
      val = val.slice(1, -1);
    data[key] = val;
  });
  return { data, body: match[2].trim() };
}

function slugify(str) {
  return str.toLowerCase()
    .replace(/ğ/g,"g").replace(/ü/g,"u").replace(/ş/g,"s").replace(/ı/g,"i").replace(/ö/g,"o").replace(/ç/g,"c")
    .replace(/[^a-z0-9]+/g, "-").replace(/^-|-$/g, "");
}

function esc(s) {
  if (!s) return "";
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

function toLocalISO(dateStr) {
  const d = new Date(dateStr);
  if (isNaN(d)) return "";
  const pad = n => String(n).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

function toast(msg, type = "info") {
  const t = document.createElement("div");
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
