local_backend: true
publish_mode: editorial_workflow

backend:
  name: github
  repo: AcruxG/educosol
  branch: main
  base_url: https://educosol-cms-proxy.vercel.app

media_folder: "static/images/portfolio"
public_folder: "/educosol/images/portfolio"

slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

# ── Shared field definitions ──────────────────
_gezi_fields: &gezi_fields
  - { label: "Başlık", name: "title", widget: "string" }
  - { label: "Program Durumu", name: "status", widget: "select", options: ["aktif", "pasif"], default: "aktif", hint: "Aktif programlar başvuya açıktır. Pasif programlar 'Geçmiş Program' olarak gösterilir ve başvuru formu gizlenir." }
  - { label: "Yayın Tarihi", name: "publishDate", widget: "datetime", required: false, hint: "Bu tarihe kadar içerik sitede görünmez. Boş bırakırsanız hemen yayınlanır." }
  - { label: "Program Tarihi", name: "date", widget: "datetime" }
  - { label: "Görsel", name: "image", widget: "image" }
  - { label: "Süre", name: "duration", widget: "string", hint: "Örn: 2 Gün 1 Gece" }
  - { label: "Konum", name: "location", widget: "string" }
  - { label: "Kademe", name: "target_group", widget: "string", hint: "Örn: Ortaokul ve Lise Öğrencileri" }
  - { label: "İlgili Okul", name: "school", widget: "string", default: "Tüm Okullar" }
  - { label: "Son Başvuru", name: "deadline", widget: "datetime" }
  - { label: "Programın Amacı", name: "program_amaci", widget: "markdown" }
  - { label: "Detaylı Gezi Planı", name: "gezi_plani", widget: "markdown" }
  - { label: "Dahil Olan Hizmetler", name: "dahil_hizmetler", widget: "markdown" }
  - { label: "Dahil Olmayan Hizmetler", name: "dahil_olmayan_hizmetler", widget: "markdown" }
  - { label: "Veli Bilgilendirme Formu", name: "veli_bilgilendirme", widget: "markdown" }
  - { label: "Önemli Notlar", name: "onemli_notlar", widget: "markdown" }
  - { label: "Ödeme Detayları", name: "odeme_detaylari", widget: "markdown" }

collections:
  - name: "yurtici-geziler"
    label: "🏔️ Yurtiçi Geziler"
    folder: "content/yurtici-geziler"
    create: true
    slug: "{{slug}}"
    fields: *gezi_fields

  - name: "yurtdisi-geziler"
    label: "✈️ Yurtdışı Geziler"
    folder: "content/yurtdisi-geziler"
    create: true
    slug: "{{slug}}"
    fields: *gezi_fields

  - name: "yurtdisi-egitim"
    label: "🎓 Yurtdışı Eğitim"
    folder: "content/yurtdisi-egitim"
    create: true
    slug: "{{slug}}"
    fields: *gezi_fields

  - name: "afterschool"
    label: "☀️ Afterschool & Yaz Okulu"
    folder: "content/afterschool"
    create: true
    slug: "{{slug}}"
    fields: *gezi_fields

  - name: "bireysel-hazirlik"
    label: "📋 Bireysel Hazırlık"
    folder: "content/bireysel-hazirlik"
    create: true
    slug: "{{slug}}"
    fields: *gezi_fields

  - name: "pages"
    label: "📄 Sayfalar"
    files:
      - file: "content/contact.md"
        label: "İletişim Sayfası"
        name: "contact"
        fields:
          - { label: "Başlık", name: "title", widget: "string" }
          - label: "SEO Ayarları"
            name: "seo_options"
            widget: "object"
            fields:
              - { label: "Açıklama", name: "description", widget: "text" }
              - { label: "Öne Çıkan Görsel", name: "featured_image", widget: "image", required: false }
          - { label: "İçerik", name: "body", widget: "markdown" }
      - file: "content/hakkimizda.md"
        label: "Hakkımızda"
        name: "about"
        fields:
          - { label: "Başlık", name: "title", widget: "string" }
          - { label: "İçerik", name: "body", widget: "markdown" }

  - name: "settings"
    label: "⚙️ Global Ayarlar"
    files:
      - file: "data/company.yml"
        label: "Şirket Bilgileri & SEO"
        name: "company"
        fields:
          - label: "SEO"
            name: "seo_options"
            widget: "object"
            fields:
              - { label: "Site Başlığı", name: "site_title", widget: "string" }
              - { label: "Site Açıklaması", name: "description", widget: "text" }
              - { label: "Sosyal Paylaşım Görseli", name: "image", widget: "image", required: false }
          - { label: "Şirket Adı", name: "company_name", widget: "string" }
          - { label: "Web3Forms Access Key", name: "web3forms_access_key", widget: "string", required: false, hint: "Ücretsiz form başvurularını e-postanıza almak için web3forms.com'dan aldığınız Access Key'i buraya yapıştırın." }
          - label: "İletişim"
            name: "contact"
            widget: "object"
            fields:
              - { label: "Adres", name: "address", widget: "string" }
              - { label: "E-posta", name: "email", widget: "string" }
              - { label: "Telefon", name: "phone", widget: "string" }
              - { label: "WhatsApp Linki", name: "whatsapp", widget: "string", required: false }
      - file: "data/nav.yml"
        label: "Navigasyon (Menü)"
        name: "nav"
        fields:
          - label: "Menü Öğeleri"
            name: "menu"
            widget: "list"
            fields:
              - { label: "İsim", name: "name", widget: "string" }
              - { label: "URL", name: "url", widget: "string" }
          - label: "Logo Ayarları"
            name: "logo"
            widget: "object"
            fields:
              - { label: "Logo Görseli", name: "image", widget: "image" }
              - { label: "Alt Metin", name: "alt", widget: "string" }
