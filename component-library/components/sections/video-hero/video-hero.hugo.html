<header class="hero-video th-fullpage" data-parallax="scroll" data-vide-bg="{{ .background_video | strings.TrimPrefix "/" | relURL }}" data-vide-options="volume: 0, loop: true, muted: true, autoplay: true, position: 50% 50%, posterType: none, resizing: true, bgColor: transparent">
    <video class="hero-video-element" autoplay muted loop playsinline preload="metadata">
      <source src="{{ printf "%s.mp4" .background_video | strings.TrimPrefix "/" | relURL }}" type="video/mp4">
      Your browser does not support the video tag.
    </video>
    <div class="container">
      <div class="hero-content-wrap">
        <span class="hero-eyebrow">Eğitim &amp; Danışmanlık</span>
        <h1 class="hero-title">{{ .heading }} <br>{{ .subheading }}</h1>
        {{ with .subtitle }}<p class="hero-sub">{{ . }}</p>{{ end }}
        <div class="hero-cta-group">
          <a href="#hizmetlerimiz" class="btn btn-outline hero-btn-secondary">Hizmetlerimizi Keşfet</a>
        </div>
      </div>
    </div>
    <div class="hero-scroll-indicator">
      <div class="hero-scroll-mouse"><div class="hero-scroll-dot"></div></div>
    </div>
  </header>
