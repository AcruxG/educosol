<!-- Clients Logo Sections
  =========================-->
  <section class="clients-logo" data-parallax="scroll" data-image-src="{{ .background_image | relURL }}">
    <div class="section">
        <div class="container">
            <div class="row">
                <div class="col-md-12 text-center" style="margin-bottom: 60px;">
                    <h2 style="color: #fff; font-size: 36px; text-transform: uppercase; font-weight: 700; letter-spacing: 2px;">{{ .heading }}</h2>
                    <div style="width: 60px; height: 3px; background: #C63527; margin: 15px auto 0;"></div>
                </div>
            </div>
            <div class="row" style="display: flex; justify-content: center; gap: 30px; flex-wrap: wrap;">
                {{ range .client_logos }}
                    {{ partial "bookshop" (slice "generic/client-logo" .)}}
                {{ end }}
            </div><!-- /.End row -->
        </div>
    </div>
</section>
