<!-- Clients Logo Sections – infinite left-to-right marquee
  =========================================================-->
<section class="clients-logo partner-marquee-section" {{ if .background_image }}data-parallax="scroll" data-image-src="{{ .background_image | strings.TrimPrefix "/" | relURL }}"{{ end }}>
  <div class="section">
    <div class="container">
      <div class="row">
        <div class="col-md-12 text-center partner-marquee-heading">
          <h2 style="color: var(--theme-color-text-main); font-size: 36px; text-transform: uppercase; font-weight: 700; letter-spacing: 2px;">{{ .heading }}</h2>
          <div style="width: 60px; height: 3px; background: #C63527; margin: 15px auto 0;"></div>
        </div>
      </div>
    </div>

    <!-- Full-width marquee track (outside container for edge-to-edge fade) -->
    <div class="partner-marquee-wrapper" aria-hidden="true">
      <div class="partner-marquee-track">
        {{ range .client_logos }}
        <div class="partner-logo-item">
          <img src="{{ .image | strings.TrimPrefix (urls.Parse site.BaseURL).Path | strings.TrimPrefix "/" | relURL }}" alt="{{ .image_alt }}" loading="lazy">
        </div>
        {{ end }}
        {{/* Duplicate set for seamless loop */}}
        {{ range .client_logos }}
        <div class="partner-logo-item" aria-hidden="true">
          <img src="{{ .image | strings.TrimPrefix (urls.Parse site.BaseURL).Path | strings.TrimPrefix "/" | relURL }}" alt="" loading="lazy">
        </div>
        {{ end }}
      </div>
    </div>

  </div>
</section>
