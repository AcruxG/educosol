<!-- Case Study Description
      top section -->
<div class="case-study-content left-right-block--{{ .background }} left-right-block--{{ .image_alignment }}">
    <div class="container">
        <div class="row">
            <div class="col-md-6">
                <!-- inner sub-title -->
                <div class="content">
                    <h4 class="inner-title"> {{ .heading }}</h4>
                    <p class="case-description">{{ .content_html | safeHTML }}</p>
                    <!-- View More Details -->
                    {{ partial "bookshop" (slice "generic/link" .link )}}
                </div>
            </div>
            <div class="col-md-6">
                <div class="img-content" style="
                    border-radius: 20px;
                    overflow: hidden;
                    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
                    transition: all 0.5s ease-in-out;
                    transform: translateY(0);
                    cursor: pointer;
                " onmouseover="this.style.transform='translateY(-10px)'; this.style.boxShadow='0 25px 50px rgba(0,0,0,0.25)';" onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 20px 40px rgba(0,0,0,0.15)';">
                    <img class="img-responsive" src="{{ .image }}" alt="{{ .image_alt }}" style="transition: transform 0.8s ease; width: 100%;" onmouseover="this.style.transform='scale(1.05)';" onmouseout="this.style.transform='scale(1)';">
                </div>
            </div>
        </div>
    </div>
</div>
