<div class="modern-testimonial-card">
    <div class="modern-testimonial-quote-mark">"</div>
    <p class="modern-testimonial-quote">{{ .quote }}</p>
    <div class="modern-testimonial-author">
        {{ if .author_image }}
        <img src="{{ .author_image | strings.TrimPrefix "/" | relURL }}" alt="{{ .author_name }}" class="modern-testimonial-avatar" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
        <div class="modern-testimonial-avatar-placeholder" style="display:none;">{{ substr .author_name 0 1 }}</div>
        {{ else }}
        <div class="modern-testimonial-avatar-placeholder">{{ substr .author_name 0 1 }}</div>
        {{ end }}
        <div class="modern-testimonial-author-info">
            <div class="modern-testimonial-author-name">{{ .author_name }}</div>
            <div class="modern-testimonial-author-role">{{ .author_role }}</div>
        </div>
    </div>
</div>
